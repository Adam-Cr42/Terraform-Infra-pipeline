name: "DEV DEPLOY"

on:
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      environment: dev
      aws-assume-role-arn: "arn:aws:iam::585008039720:role/github-actions-Adam-Cr42-pipeline"
      aws-region: "us-east-2"
      aws-statefile-s3-bucket: "adam-cr42-sa-east-1-terraform-statefile"
      aws-lock-dynamodb-table: "adam-cr42-sa-east-1-terraform-lock"